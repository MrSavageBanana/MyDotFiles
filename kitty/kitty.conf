# Configuration
include ~/.cache/wal/colors-kitty.conf
font_family                 JetBrainsMono Nerd Font
font_size                   12
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
remember_window_size        no
initial_window_width        950
initial_window_height       500
cursor_blink_interval       0.5
cursor_stop_blinking_after  1
scrollback_lines            20000000000
wheel_scroll_min_lines      1
enable_audio_bell           no
window_padding_width        10
hide_window_decorations titlebar-only
background_opacity          0.7
dynamic_background_opacity  no
confirm_os_window_close     0
selection_foreground        none
selection_background        none
cursor_trail 1
notify_on_cmd_finish invisible
active_border_color #ffffff
# inactive_window_opacity 0.75
linux_display_server wayland
map ctrl+shift+d detach_tab
map ctrl+alt+d detach_window
map ctrl+shift+= change_font_size current +2.0
map ctrl+shift+- change_font_size current -2.0
map ctrl+shift+p launch --stdin-source=@last_cmd_output --type=overlay nvim
map f1 save_as_session --use-foreground-process --relocatable
mouse_map right press ungrabbed mouse_select_command_output
map ctrl+w>h neighboring_window left
map ctrl+w>j neighboring_window down
map ctrl+w>k neighboring_window up
map ctrl+w>l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+w>h
map --when-focus-on var:IS_VIM=true ctrl+w>j
map --when-focus-on var:IS_VIM=true ctrl+w>k
map --when-focus-on var:IS_VIM=true ctrl+w>l
map ctrl+shift+k kitten kitty_grab/grab.py
map ctrl+shift+a copy_last_command_output
map ctrl+shift+o launch --stdin-source=@last_cmd_output --type=overlay nvim
allow_remote_control yes
listen_on unix:@mykitty
